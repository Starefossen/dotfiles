[env]
DOCKER_HOST = "unix://~/.colima/default/docker.sock"
PNPM_HOME = "~/Library/pnpm"
NODE_OPTIONS = "--no-deprecation"
FZF_DEFAULT_COMMAND = 'fd --hidden --exclude .git'
KUBECONFIG = "~/.kube/config"
KUBE_EDITOR = "nvim"
GOPATH = "~/go"
_.path = ["~/Library/pnpm"]

[tools]
"aqua:bitwarden/clients" = "cli-v2025.5.0"
fnox = "latest"
gcloud = "528.0.0"
go = "1.26"
opentofu = "latest"
pnpm = "11"
rust = "latest"
uv = "latest"
"go:github.com/sethvargo/ratchet" = "latest"
watchexec = "latest"
node = "24"
actionlint = "latest"
bat = "latest"
delta = "latest"
difftastic = "latest"
fd = "latest"
fzf = "latest"
gh = "latest"
gitleaks = "latest"
jq = "latest"
lefthook = "latest"
yq = "latest"
kubectx = "0.9.5"
kubectl = "1.32.0"
helm = "3.16.3"
kustomize = "5.5.0"
kubebuilder = "4.3.1"
yarn = "1.22.22"

[settings]
idiomatic_version_file_enable_tools = []
